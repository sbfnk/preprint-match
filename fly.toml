app = 'preprint-match'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/"

[mounts]
  source = "analytics_data"
  destination = "/data"

[env]
  ANALYTICS_DB = "/data/analytics.db"

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
